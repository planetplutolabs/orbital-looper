name: Build Orbital Looper

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  JUCE_VERSION: "8.0.12"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install JUCE
        run: |
          git clone --branch ${{ env.JUCE_VERSION }} --depth 1 https://github.com/juce-framework/JUCE.git ${{ runner.temp }}/JUCE

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_DIR=${{ runner.temp }}/JUCE

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          mkdir -p staging
          find build -name "*.component" -type d -exec cp -r {} staging/ \;
          find build -name "*.vst3" -type d -exec cp -r {} staging/ \;
          cd staging && zip -r ../OrbitalLooper-macOS.zip . && cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: OrbitalLooper-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install JUCE
        run: |
          git clone --branch ${{ env.JUCE_VERSION }} --depth 1 https://github.com/juce-framework/JUCE.git ${{ runner.temp }}/JUCE

      - name: Configure
        run: |
          cmake -B build -DJUCE_DIR=${{ runner.temp }}/JUCE

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: bash
        run: |
          mkdir -p staging
          find build -name "*.vst3" -type d -exec cp -r {} staging/ \;
          cd staging && 7z a ../OrbitalLooper-Windows.zip . && cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: OrbitalLooper-Windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev \
            libcurl4-openssl-dev libfreetype6-dev libx11-dev \
            libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev

      - name: Install JUCE
        run: |
          git clone --branch ${{ env.JUCE_VERSION }} --depth 1 https://github.com/juce-framework/JUCE.git ${{ runner.temp }}/JUCE

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_DIR=${{ runner.temp }}/JUCE

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          mkdir -p staging
          find build -name "*.vst3" -type d -exec cp -r {} staging/ \;
          cd staging && zip -r ../OrbitalLooper-Linux.zip . && cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: OrbitalLooper-Linux.zip
