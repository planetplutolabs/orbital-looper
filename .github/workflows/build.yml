name: Build Orbital Looper

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install JUCE
        run: |
          brew install cmake
          git clone --branch 7.0.12 --depth 1 https://github.com/juce-framework/JUCE.git ~/JUCE
      
      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_DIR=~/JUCE \
            -S .
      
      - name: Build
        run: cmake --build build --config Release
      
      - name: Package
        run: |
          cd build
          zip -r ../OrbitalLooper-macOS.zip *.component *.vst3 || true
          find . -name "*.component" -o -name "*.vst3" | head -20
      
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: OrbitalLooper-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install JUCE
        run: |
          git clone --branch 7.0.12 --depth 1 https://github.com/juce-framework/JUCE.git C:/JUCE
      
      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -DJUCE_DIR=C:/JUCE `
            -S .
      
      - name: Build
        run: cmake --build build --config Release
      
      - name: Package
        shell: bash
        run: |
          cd build
          7z a ../OrbitalLooper-Windows.zip *.vst3 -r || true
          find . -name "*.vst3" | head -20
      
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: OrbitalLooper-Windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev \
            libcurl4-openssl-dev libfreetype6-dev libx11-dev \
            libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.0-dev libglu1-mesa-dev mesa-common-dev
          git clone --branch 7.0.12 --depth 1 https://github.com/juce-framework/JUCE.git ~/JUCE
      
      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_DIR=~/JUCE \
            -S .
      
      - name: Build
        run: cmake --build build --config Release
      
      - name: Package
        run: |
          cd build
          zip -r ../OrbitalLooper-Linux.zip *.vst3 -r || true
          find . -name "*.vst3" | head -20
      
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: OrbitalLooper-Linux.zip
